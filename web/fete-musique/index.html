<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fête de la Musique 2026 — Toulouse</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #6b21a8, #9333ea, #a855f7);
      color: white;
      text-align: center;
      padding: 6px 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    header p {
      font-size: 0.95rem;
      opacity: 0.9;
      margin-top: 2px;
    }

    #map {
      flex: 1;
    }

    .legend-wrapper {
      background: white;
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
      padding: 4px 8px 5px;
    }

    .legend-title {
      font-size: 0.75rem;
      color: #6b21a8;
      font-weight: 600;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 0.65rem;
      color: #374151;
      cursor: pointer;
      transition: opacity 0.2s;
      user-select: none;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .marker-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    }

    .leaflet-popup-content {
      margin: 10px 14px;
      line-height: 1.5;
    }

    .popup-name {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 2px;
    }

    .popup-style {
      font-style: italic;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .popup-address {
      font-size: 0.85rem;
      color: #4b5563;
      margin-top: 4px;
    }

    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      font-size: 1.1rem;
      color: #6b21a8;
      font-weight: 500;
    }

    .error-banner {
      background: #fef2f2;
      color: #991b1b;
      text-align: center;
      padding: 12px;
      font-size: 0.9rem;
      display: none;
    }

    /* ---- Floating action buttons ---- */
    .fab-row {
      position: absolute;
      top: 40px;
      left: 8px;
      right: 8px;
      z-index: 1000;
      display: flex;
      gap: 6px;
      pointer-events: none;
    }

    .fab-btn {
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      background: white;
      color: #6b21a8;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 6px 10px;
      border: none;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      cursor: pointer;
      white-space: nowrap;
    }

    .fab-btn:active { opacity: 0.7; }

    .fab-btn.accent {
      background: linear-gradient(135deg, #6b21a8, #a855f7);
      color: white;
    }

    /* ---- Programme panel ---- */
    .panel-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 2000;
      display: none;
    }

    .panel-overlay.visible { display: flex; }

    .panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      max-height: 80vh;
      background: white;
      border-radius: 16px 16px 0 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    .panel-header h2 {
      font-size: 1rem;
      color: #1f2937;
    }

    .panel-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #9ca3af;
      cursor: pointer;
      line-height: 1;
    }

    .panel-body {
      overflow-y: auto;
      padding: 8px 16px 16px;
      -webkit-overflow-scrolling: touch;
    }

    .prog-style-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #6b21a8;
      margin: 10px 0 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .prog-style-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .prog-group {
      padding: 6px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .prog-group-name {
      font-weight: 600;
      font-size: 0.85rem;
      color: #1f2937;
    }

    .prog-group-address {
      font-size: 0.75rem;
      color: #6b7280;
    }

    /* ---- Add group form ---- */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 10px;
    }

    .form-field label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #374151;
    }

    .form-field input, .form-field select {
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
    }

    .form-field input:focus, .form-field select:focus {
      border-color: #a855f7;
    }

    .form-submit {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #6b21a8, #a855f7);
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 4px;
    }

    .form-submit:disabled {
      opacity: 0.5;
    }

    .form-msg {
      text-align: center;
      font-size: 0.8rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>&#127925; F&ecirc;te de la Musique 2026</h1>
  </header>
  <div id="error-banner" class="error-banner"></div>
  <div id="map"></div>

  <!-- Floating buttons -->
  <div class="fab-row">
    <button class="fab-btn" onclick="openPanel('programme')">&#127926; Programmation</button>
    <button class="fab-btn accent" onclick="openPanel('add')">&#43; Rajouter son groupe</button>
  </div>

  <!-- Programme panel -->
  <div id="panel-programme" class="panel-overlay" onclick="if(event.target===this)closePanel('programme')">
    <div class="panel">
      <div class="panel-header">
        <h2>&#127926; Programmation</h2>
        <button class="panel-close" onclick="closePanel('programme')">&times;</button>
      </div>
      <div class="panel-body" id="programme-body"></div>
    </div>
  </div>

  <!-- Add group panel -->
  <div id="panel-add" class="panel-overlay" onclick="if(event.target===this)closePanel('add')">
    <div class="panel">
      <div class="panel-header">
        <h2>&#127928; Rajouter son groupe</h2>
        <button class="panel-close" onclick="closePanel('add')">&times;</button>
      </div>
      <div class="panel-body">
        <form id="add-form" onsubmit="return submitGroup(event)">
          <div class="form-field">
            <label>Nom du groupe *</label>
            <input type="text" id="f-name" required placeholder="Ex : Les Toulousains">
          </div>
          <div class="form-field">
            <label>Style musical *</label>
            <select id="f-style" required>
              <option value="">Choisir...</option>
            </select>
          </div>
          <div class="form-field">
            <label>Adresse du concert *</label>
            <input type="text" id="f-address" required placeholder="Ex : Place du Capitole">
          </div>
          <button type="submit" class="form-submit" id="f-submit">Envoyer</button>
          <div id="form-msg" class="form-msg"></div>
        </form>
      </div>
    </div>
  </div>

  <div class="legend-wrapper">
    <div class="legend-title">Appuie sur un style pour filtrer</div>
    <div id="legend" class="legend"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dpqxefmwjfvoysacwgef.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwcXhlZm13amZ2b3lzYWN3Z2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyOTkxMTgsImV4cCI6MjA4NTg3NTExOH0.xzNidmrcNsUhpsTFcaaL_lXtHcx_MWzQHCPF7kY5i90';

    // Couleurs connues — les styles absents de cette map recevront une couleur auto
    const KNOWN_COLORS = {
      'Rock':               '#e74c3c',
      'Jazz':               '#3498db',
      'Electro':            '#9b59b6',
      'Hip-Hop':            '#f39c12',
      'Classique':          '#1abc9c',
      'Reggae':             '#2ecc71',
      'Chanson Française':  '#e91e63',
      'World Music':        '#ff9800',
      'Metal':              '#34495e',
      'Blues':               '#2196f3',
    };

    // Palette de secours pour les styles non prévus
    const EXTRA_PALETTE = ['#e67e22','#16a085','#8e44ad','#d35400','#27ae60','#c0392b','#2980b9','#f1c40f'];
    let extraIndex = 0;

    function colorForStyle(style) {
      if (KNOWN_COLORS[style]) return KNOWN_COLORS[style];
      const color = EXTRA_PALETTE[extraIndex % EXTRA_PALETTE.length];
      extraIndex++;
      KNOWN_COLORS[style] = color;  // cache pour réutilisation
      return color;
    }

    // Init map
    const map = L.map('map').setView([43.6047, 1.4442], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    const styleLayers = {};
    const legendEl = document.getElementById('legend');

    function createMarkerIcon(color) {
      return L.divIcon({
        className: '',
        html: `<div class="marker-icon" style="background:${color}"></div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12],
        popupAnchor: [0, -14],
      });
    }

    function showError(message) {
      const banner = document.getElementById('error-banner');
      banner.textContent = message;
      banner.style.display = 'block';
    }

    function buildLegend() {
      legendEl.innerHTML = '';
      Object.entries(styleLayers).forEach(([style, layer]) => {
        const color = colorForStyle(style);
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${style}`;
        item.addEventListener('click', () => {
          if (map.hasLayer(layer)) {
            map.removeLayer(layer);
            item.style.opacity = '0.3';
          } else {
            map.addLayer(layer);
            item.style.opacity = '1';
          }
        });
        legendEl.appendChild(item);
      });
    }

    // Fetch groups & render markers + legend
    async function loadGroups() {
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const { data, error } = await supabase
        .from('groups')
        .select('*')
        .eq('is_visible', true);

      if (error) {
        showError(`Erreur de chargement : ${error.message}`);
        console.error('Supabase error:', error);
        return;
      }

      if (!data || data.length === 0) {
        showError('Aucun groupe trouvé.');
        return;
      }

      allGroups = data;

      data.forEach(group => {
        const style = group.music_style;
        const color = colorForStyle(style);

        if (!styleLayers[style]) {
          styleLayers[style] = L.layerGroup().addTo(map);
        }

        const marker = L.marker([group.latitude, group.longitude], {
          icon: createMarkerIcon(color),
        });

        marker.bindPopup(`
          <div class="popup-name">${group.name}</div>
          <div class="popup-style">${style}</div>
          <div class="popup-address">${group.address}</div>
        `);

        styleLayers[style].addLayer(marker);
      });

      buildLegend();
    }

    // ---- Panels ----
    function openPanel(name) {
      document.getElementById('panel-' + name).classList.add('visible');
      if (name === 'programme') buildProgramme();
    }

    function closePanel(name) {
      document.getElementById('panel-' + name).classList.remove('visible');
    }

    // ---- Programme list ----
    let allGroups = [];

    function buildProgramme() {
      const body = document.getElementById('programme-body');
      body.innerHTML = '';

      if (allGroups.length === 0) {
        body.innerHTML = '<p style="text-align:center;color:#9ca3af;padding:20px;">Aucun groupe pour l\'instant.</p>';
        return;
      }

      // Group by style
      const byStyle = {};
      allGroups.forEach(g => {
        if (!byStyle[g.music_style]) byStyle[g.music_style] = [];
        byStyle[g.music_style].push(g);
      });

      Object.entries(byStyle).sort(([a],[b]) => a.localeCompare(b)).forEach(([style, groups]) => {
        const color = colorForStyle(style);
        const title = document.createElement('div');
        title.className = 'prog-style-title';
        title.innerHTML = `<span class="prog-style-dot" style="background:${color}"></span>${style} (${groups.length})`;
        body.appendChild(title);

        groups.sort((a,b) => a.name.localeCompare(b.name)).forEach(g => {
          const row = document.createElement('div');
          row.className = 'prog-group';
          row.innerHTML = `<div class="prog-group-name">${g.name}</div><div class="prog-group-address">${g.address}</div>`;
          row.addEventListener('click', () => {
            closePanel('programme');
            map.setView([g.latitude, g.longitude], 17);
            // Find and open the marker popup
            const layer = styleLayers[g.music_style];
            if (layer) {
              layer.eachLayer(m => {
                const ll = m.getLatLng();
                if (ll.lat === g.latitude && ll.lng === g.longitude) m.openPopup();
              });
            }
          });
          row.style.cursor = 'pointer';
          body.appendChild(row);
        });
      });
    }

    // ---- Add group form ----
    function populateStyleSelect() {
      const select = document.getElementById('f-style');
      const styles = Object.keys(KNOWN_COLORS).sort();
      styles.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        select.appendChild(opt);
      });
      // "Autre" option
      const other = document.createElement('option');
      other.value = '__other__';
      other.textContent = 'Autre...';
      select.appendChild(other);

      select.addEventListener('change', () => {
        if (select.value === '__other__') {
          const custom = prompt('Quel style musical ?');
          if (custom && custom.trim()) {
            const opt = document.createElement('option');
            opt.value = custom.trim();
            opt.textContent = custom.trim();
            select.insertBefore(opt, select.lastElementChild);
            select.value = custom.trim();
          } else {
            select.value = '';
          }
        }
      });
    }

    async function submitGroup(e) {
      e.preventDefault();
      const btn = document.getElementById('f-submit');
      const msg = document.getElementById('form-msg');
      btn.disabled = true;
      msg.textContent = '';

      const name = document.getElementById('f-name').value.trim();
      const style = document.getElementById('f-style').value;
      const address = document.getElementById('f-address').value.trim();

      if (!name || !style || !address) return;

      // Geocode address via Nominatim
      let lat, lng;
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address + ', Toulouse, France')}&limit=1`);
        const results = await res.json();
        if (results.length > 0) {
          lat = parseFloat(results[0].lat);
          lng = parseFloat(results[0].lon);
        } else {
          msg.style.color = '#991b1b';
          msg.textContent = 'Adresse introuvable. Essaie avec plus de details.';
          btn.disabled = false;
          return;
        }
      } catch {
        msg.style.color = '#991b1b';
        msg.textContent = 'Erreur de geocodage.';
        btn.disabled = false;
        return;
      }

      // Insert into Supabase (is_visible = false → moderation)
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { error } = await supabase.from('groups').insert({
        name, music_style: style, address, latitude: lat, longitude: lng, is_visible: false,
      });

      if (error) {
        msg.style.color = '#991b1b';
        msg.textContent = 'Erreur : ' + error.message;
        btn.disabled = false;
        return;
      }

      msg.style.color = '#059669';
      msg.textContent = 'Merci ! Ton groupe sera visible apres validation.';
      document.getElementById('add-form').reset();
      btn.disabled = false;
    }

    // ---- Init ----
    populateStyleSelect();
    loadGroups();
  </script>
</body>
</html>
